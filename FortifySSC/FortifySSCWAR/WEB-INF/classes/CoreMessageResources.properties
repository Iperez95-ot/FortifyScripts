# Begin runtime messages

console.eventhandlers.name = Console Defined Event Handlers
console.eventhandlers.description = This is where event handlers created in the console are processed in the chain.

default.eventhandler.name = Default Event Handler
default.eventhandler.description = The default handler handles every event that makes it all the way to the bottom of the chain.

rtsetting.name.ConfigurationId = Configuration ID
rtsetting.description.ConfigurationId = Unique identifier of the configuration. This value is set by the server and should never be manually altered.

rtsetting.name.ConfigurationMonitorThread = Enable Configuration Monitor Thread
rtsetting.description.ConfigurationMonitorThread = If true, allows automatic reloading of configuration when configuration files change. If false, configuration files are not monitored.

rtsetting.name.DisplayDefaultForwardPath = Display Default Foward Path
rtsetting.description.DisplayDefaultForwardPath = The default forward path used with the display action. Used if no settings are supplied on the action. If this setting has a value, the runtime will transfer processing of this HTTP request to the given path. Note that this is NOT an HTTP redirect. All processing stays on the server.

rtsetting.name.DisplayDefaultHtml = Display Default HTML
rtsetting.description.DisplayDefaultHtml = The default html used with the display action. Used if no settings are supplied on the action. If this option is set, the runtime will create an HTTP 200 response and include this value as the body of the response.

rtsetting.name.DisplayDefaultHttpStatusCode = Display Default HTTP Status Code
rtsetting.description.DisplayDefaultHttpStatusCode = The default HTTP status code used with the display action. Used if no settings are supplied on the action. If this setting has a value greater than zero, the HTTP status code of the response will be set to this value. If DisplayDefaultText is not empty, it will be used as the text of the response.

rtsetting.name.DisplayDefaultText = Display Default Text
rtsetting.description.DisplayDefaultText = The default text used with the display action. Used if no settings are supplied on the action. If this option is set, the runtime will create an HTTP 200 response and include this value as the body of the response.

rtsetting.name.EnableActions = Protect Mode Enabled
rtsetting.description.EnableActions = If true, the actions defined in event handlers will be carried out.  If false, the actions defined in event handlers will be ignored.

rtsetting.name.Enabled = Enabled
rtsetting.description.Enabled = Controls whether the runtime platform will watch the target program. If Enabled is true, the runtime platform is engaged. If it is false, the runtime platform will not monitor the target program. The Enabled tag is a quick way to engage the runtime platform or to take it out of the equation.

rtsetting.name.EventLogFile = Event Log File
rtsetting.description.EventLogFile = Name of the log file where events are written. The special name stdout will cause events to be written to the console rather than to a log file. If more than one concurrent runtime process is configured to write to the same log file, the second process will write to event1.log, the third to event2.log, and so on.

rtsetting.name.EventLogFileMaxBackups = Event Log File Max Backups
rtsetting.description.EventLogFileMaxBackups = Maximum number of event log file backups made before log data is overwritten.

rtsetting.name.EventLogFileMaxSize = Event Log File Max Size
rtsetting.description.EventLogFileMaxSize = Maximum size of the event log file before moving log data to a backup. The number of the backup file will be appended to the file name. For example, the first backup file will be named event.log.1, the second event.log.2, and so on.

rtsetting.name.FortifyLicenseFile = Fortify License File
rtsetting.description.FortifyLicenseFile = The path to the Fortify license file. The runtime platform requires an up-to-date license in order to run.

rtsetting.name.LogDefaultPicture = Log Default Picture
rtsetting.description.LogDefaultPicture = The format picture used for event log messages.

rtsetting.name.SyslogDefaultPicture = Syslog Default Picture
rtsetting.description.SyslogDefaultPicture = The format picture used for syslog messages. All event attributes are sent.

rtsetting.name.SyslogDefaultSeverity = Syslog Default Severity
rtsetting.description.SyslogDefaultSeverity = The severity used for syslog messages if no severity is specified by the dispatcher.

rtsetting.name.SyslogPort = Syslog Port
rtsetting.description.SyslogPort = The port syslog messages are delivered to.

rtsetting.name.SyslogServer = Syslog Server
rtsetting.description.SyslogServer = The host syslog messages are delivered to.

rtsetting.name.SystemLogFile = System Log File
rtsetting.description.SystemLogFile = Name of the log file where system messages are written. If more than one concurrent runtime process is configured to write to the same log file, the second process will write to system1.log, the third to system2.log, and so on.

rtsetting.name.SystemLogFileMaxBackups = System Log File Max Backups
rtsetting.description.SystemLogFileMaxBackups = Maximum number of system log file backups made before log data is overwritten.

rtsetting.name.SystemLogFileMaxSize = System Log File Max Size
rtsetting.description.SystemLogFileMaxSize = Maximum size of the system log file before moving log data to a backup. For example, the first backup file will be named system.log.1, the second system.log.2, and so on.

rtsetting.name.SystemLogLevel = System Log Level
rtsetting.description.SystemLogLevel = The minimum severity of system messages written to the log file. Options are trace, debug, info, warn, error, and fatal.

rtsetting.name.WriteEventsToLogFile = Write Events To Local Log
rtsetting.description.WriteEventsToLogFile = If true, the runtime host will log all events to a local event log file.

