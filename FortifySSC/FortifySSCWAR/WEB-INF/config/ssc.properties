### ssc.properties

# Custom attribute configuration
project.template.attribute.only=true
project.customtag.map.unknown.to.badpractice=true
techstack.id=Languages
payload.verification.dependency.check=true
# Semicolon separated list of custom tag values that can be replaced when auto apply is is performed
# Example: tag_guid1:Not an issue;tag_guid2:Not an issue
custom.tag.values.allowed.to.replace=

# 22.1 and higher validates non-negative indices by default for new customtag definitions.
# Pre-22.1, customtag definitions in projecttemplates were not validated for
# negative lookup values but were silently mutated in a fragile non-obvious way when stored in ssc.
custom.tag.values.lookupindices.handling.legacy=false

monodis.path=monodis

#whether the download/upload controllers return OK http status code regardless of the error
file.controller.okresponse=false

driver.type.oracle=oracle
driver.type.sqlserver=microsoft sql server
driver.type.mysql=mysql

# comma separated list of events to exclude from creating event log entries
event.log.exclusions = EVENTLOG_ENTRY_CREATED,CLOUD_SCAN_POLLED,RUNTIME_EVENT_RECEIVED,RUNTIME_ALERT_RECEIVED

# comma separated list of events to mark as security related events
event.log.security.events = WEBUI_LOGIN_SUCCESS,WEBUI_LOGIN_FAILED,WEBUI_LOGOUT,WEBUI_LOGIN_WITH_NO_ROLE,\
  WS_LOGIN_SUCCESS,WS_LOGIN_FAILED,WS_LOGIN_WITH_NO_ROLE,\
  LOCAL_USER_CREATED,LOCAL_USER_UPDATED,LOCAL_USER_DELETED,LOCAL_USER_FROZEN,\
  LOCAL_GROUP_CREATED,LOCAL_GROUP_UPDATED,LOCAL_GROUP_DELETED,\
  AGENT_CREDENTIAL_CREATED,AGENT_CREDENTIAL_UPDATED,AGENT_CREDENTIAL_DELETED,\
  LDAP_ENTITY_CREATED,LDAP_ENTITY_UPDATED,LDAP_ENTITY_DELETED,\
  LDAP_CACHE_REFRESH_REQUESTED,LDAP_CACHE_REFRESH_STARTED,LDAP_CACHE_REFRESH_COMPLETED,\
  PROJECT_VERSION_ACCESS_ADDED,PROJECT_VERSION_ACCESS_REMOVED,\
  PERSONA_ASSIGNMENT_UPDATED,\
  RUNTIME_HOST_CONNECTED,RUNTIME_HOST_DISCONNECTED,\
  RUNTIME_HOST_CREATED,RUNTIME_HOST_DELETED,RUNTIME_HOST_DISCOVERED,RUNTIME_HOST_ENABLED,RUNTIME_HOST_DISABLED,\
  ACCEPT_NEW_HOSTS_ENABLED,ACCEPT_NEW_HOSTS_DISABLED,\
  RTAPP_ACCESS_ADDED,RTAPP_ACCESS_REMOVED

# comma seperated list of events to exclude from activity feed
event.log.activityfeed.exclusions = WEBUI_LOGIN_FAILED,WEBUI_LOGOUT,WS_LOGIN_SUCCESS,WS_LOGIN_FAILED,WS_LOGIN_WITH_NO_ROLE,\
  LOCAL_USER_UPDATED,LOCAL_USER_CREATED,LOCAL_USER_DELETED,LOCAL_USER_FROZEN,\
  LOCAL_GROUP_CREATED,LOCAL_GROUP_UPDATED,LOCAL_GROUP_DELETED,\
  LDAP_ENTITY_CREATED,LDAP_ENTITY_UPDATED,LDAP_ENTITY_DELETED,\
  LDAP_CACHE_REFRESH_REQUESTED,PROJECT_VERSION_ACCESS_ADDED,PROJECT_VERSION_ACCESS_REMOVED,ARTIFACT_UPLOAD_STARTED,\
  DOCUMENT_ARTIFACT_CREATED,DOCUMENT_ARTIFACT_UPDATED,DOCUMENT_ARTIFACT_DELETED,AUDIT_PERFORMED,DUE_DATE_UPDATED,\
  TASK_INSTANCE_CREATED,TASK_INSTANCE_UPDATED,TASK_INSTANCE_DELETED,TASK_INSTANCE_SIGNOFF_UPDATED,\
  ACTIVITY_INSTANCE_SIGNOFF_UPDATED,REQUIREMENT_INSTANCE_SIGNOFF_UPDATED,REQUIREMENT_TEMPLATE_INSTANCE_SIGNOFF_UPDATED,\
  SESSION_TIMEOUT,ARTIFACT_DELETE_STARTED,ARTIFACT_PURGE_REQUEST_STARTED,FILTERSET_FOLDER_REFRESH_REQUESTED,\
  FILTERSET_FOLDER_REFRESH_COMPLETED,FILTERSET_FOLDER_REFRESH_FAILED,PERSONA_ASSIGNMENT_UPDATED,WORK_OWNER_UPDATED,\
  ACCEPT_NEW_HOSTS_ENABLED,ACCEPT_NEW_HOSTS_DISABLED,DISABLED_HOST_CONNECTION,\
  REAPPLY_APPLICATION_ASSIGNMENT_RULES_REQUESTED,DYNAMIC_SCAN_EDITED,BATCH_BUG_FILING_REQUESTED,BUG_STATE_MANAGEMENT_STARTED,\
  BUG_STATE_MANAGEMENT_ENDED,BUG_STATE_MANAGEMENT_ENDED_WITH_ERRORS

# whether we want to run iid migration on solaris server
run.iidmigration.on.solaris=false

# whether we want to allow backward compatibility
allow.backward.compatibility=true

# number of events to process in each batch
rta.event.parsing.batch.size=10000

# Comma separated general extension blacklist for upload validation.
# Original filenames given in any SSC HTTP multipart upload having blacklisted extension are refused from upload.
# If property is not defined, SSC will not start.
# If property is defined as empty, no extensions will be blocked by blacklist validation.
# Whitespaces between delimited strings are ignored.
# Upper/lower cases don't matter, everything is converted to lower case before validation.
# Blocking of files having no extension can be achieved by the property defined with empty element like this example:
#     extension.upload.blacklist=exe,,com, ...
extension.upload.blacklist=com,exe,cmd,bat,ps1,msi,msp,mst

age.of.orphaned.docs.to.clean.up.hours=5

# number of seconds to wait before retrying a Quartz job that failed due to a temporary fault
temp.fault.retry.delay=600

# If this parameter is true, every time when new local user is created in SSC it will be checked if user with the same user name exists in LDAP directory.
# But this feature decreases the performance of local user adding since communicating with LDAP directory can be quite slow.
#So, if you 100% sure that local user names are not intersect with LDAP user names, disable this property.
keep.local.and.ldap.user.storage.consistent = false

# Fire an alert every time when it's updated.
# In previous versions of the SSC, is some event associated with alert associated with alert had already been happened, and alert definition was changed,
# this alert was fired again. As a result, multiply alerts could be created for some specific event.
# If this option is enabled (= true), SSC will process alerts in the old way.
# If this option is disabled (= false), alert will not be re-fired is it's changed, but will be fired if this event happens after alert update.
refire.alerts.on.update=false

# Maximum number of concurrent exclusive jobs that can run at the same time.
# May not be used by all strategies.
job.numberOfConcurrentExclusiveJobs=1

# Maximum number of concurrent report jobs that can run at the same time.
# May not be used by all strategies.
job.numberOfConcurrentReports=2

# When at least one exclusive job is running, the amount of concurrent jobs
# will be reduced by this percentage. Must be between 0 and 100.
# It does not affect threads dedicated to data exports.
job.exclusiveJobOverheadPercentage=20

# Schedule for performing source files cleanup tasks.
# This parameter uses Quartz cron expression dialect.
# For example, "0 0 0 ? * * *" value means that cleanup will be performed every day at 12:00 AM
job.sourceFileCleanup.cron=0 0 0 ? * * *

# deletes internally generated token alerts upon the specified days after creation.
# Allowed range: [1,15]
token.management.alert.lifetime.days=7

# the maximum number of tokens owned by a user (and *not* associated to a session). (only enforced at new token creation.)
# Such tokens are usually generated via the REST /tokens endpoint or fortifyclient, and are typically used for automations/integrations with SSC.
# Clients are expected to revoke unneeded tokens as soon as possible. There is also a daily job which cleans up expired tokens.
# Allowed range: [10,500].  We do not recommend changing this value unless advised by Fortify customer support.
token.management.user.sessionless.tokens.max=100

# the maximum number of tokens owned by a user (and associated with sessions). (only enforced at new token creation.)
# Such tokens are generally created by user login via the WebUI and get cleared when the session ends or times-out.
# Allowed range: [10, 500]. We do not recommend changing this value unless advised by Fortify customer support.
token.management.user.session.tokens.max=100

# the number of seconds by which the terminal date sent by client can exceed the nominal max life
# when creating/editing tokens. Although we expect customers to maintain properly synced clocks, this
# allows a tolerance for those cases where a client clock may be slightly ahead of the server clock (in UTC terms).
# Allowed range: [0,1200]
token.management.terminal.date.tolerance.seconds=300

# Max number of concurrent threads to query dashboard objects.  This is per dashboard request.
dashboard.max.threads=5
# These are to limit how many total db queries are run at the same time.
dashboard.core.pool.size=20
dashboard.max.pool.size=50

# This property is used in this class - AuditedAnalysisRule.
# It affects user permission checking when new FPR file is uploading if user does not have Suppress/Un-Suppress permission.
# SSC used to check permission if the following way: if user did not have Suppress/Un-Suppress permission and FPR contained
# issues where suppression value had been changed, this FPR could not be uploaded by this user.
# It was not appropriate for some SSC customers and it was decided to make this behaviour configurable.
# If this option is disabled, SSC behaves in a "classic" way - all suppression changes are denied for users who don't have
# Suppress/UnSuppress permission.
# if this option is enabled, SSC ignores all suppression changes if issue is currently un-suppressed.
# This option is useful only for the users who does not have Suppress/Un-Suppress permission.
# It's not used in all other cases.
audit.rule.allowUnSuppressionInFprAudit=false

# This property formats the date to include time when a dashboard is aggregated by a date attribute.
# This can be used to maintain backward API compatibility with Oracle and MS SQL databases.
dashboard.aggregation.dateFormatBackwardCompatibility = false

# DOCTYPE declaration and external entity expansion is by default left alone from BIRT reports (rptdesign)
# and BIRT libraries (rptlibrary) at upload.  BIRT 4.7 handles XXE and XEE.
birt.report.removeDTD=false

# Temporary directory for BIRT reporting
# Value of birt.tmp.dir is by default not set by SSC, which results in using java.io.tmpdir for this purpose.
# Different location can be set as a full path to directory
#    - directory must be writable and readable by application
#    - correct file separators must be used: single slashes "/" for Unix, single slashes "/" or double backslashes "\\" for Windows
# Possibilities for birt.tmp.dir:
#    - commented out (SSC default) or blank -> BIRT tmp dir will be set by SSC to java.io.tmpdir
#    - uncommented not blank -> BIRT tmp dir will be set by SSC using the provided property value
# birt.tmp.dir=

# SMTP server host name configured in SSC is by default verified against SMTP server identity from its certificate
# if SSL/TLS for SMTP communication is enabled (SSC Administration -> Configuration -> Email). Identity checking is
# active if this property is set to true, which is strongly recommended as a prevention against MITM (man in the middle) attacks.
# Basically it means that fully qualified SMTP server host name (FQDN) must correspond to the server's identity
# from its certificate. More details can be found in "RFC 2595, Server Identity Check".
# If it is really necessary, identity checking can be disabled by setting this property to false and restarting SSC server.
email.server.ssl.checkServerIdentity=true

# System variable to let customers return the old behaviour in SSC 18.20+
# In SSC < 18.10 every change in variables and performance indicators (create or update) caused triggering snaphot
# calculation for all project versions. In 18.20 it was decided to disable this behaviour by default, so new values of
# variables will be calculated only after normal snap shot calculations triggered by FPR uploads or issue audits.
# Mass recalculation can affect performance and it is better to avoid it if possible.
invalidate.snapshots.after.variables.changes=false

# Binding that SSC will expect when receiving Assertion (auth response) from IdP in case of SAML Single Sign On. Available values: POST, REDIRECT
sso.saml.login.binding.consume=POST

# Used in SAML Single Logout (SLO) to determine landing URL after successful finalization of SLO process initialized from SSC.
# Incoming request from IDP will be checked for parameter with this name. If present, it's value will be used as target URL.
# sso.saml.logout.targetURLParameterName=targetUrl

# If set, URL will be used as Single Logout URL for any type of SSO solution.
# Note: if Single Logout is forced by setting sso.logout.mode=forced below, any logout will result in redirecting to given URL
sso.logout.url=

# Modifies logout behaviour. Supported values:
# DEFAULT - local account logout available, Single Logout available if supported for SSO solution used
# DISABLED - logout actively initiated by user is automatically treated as local account logout only
# FORCED - logout actively initiated by user is automatically treated as Single Logout
sso.logout.mode=default

# Whether a fortify user logged in via SSO is able to change his locally stored password.
# Set to true for backward compatibility.
sso.local.password.change.allowed=false

# Comma separated list of allowed hashing algorithms to be used with request to /d3srv
# When request does not have hash algorithm specified, first one is used as default.
rulepack.download.allowed.algorithms=md5,sha-256,sha-512

# Enable legacy basic authentication for all API endpoints.
rest.auth.basic.legacy.enable=false

# Inactive session lifetime to be used when a new session is created during a request using transient authentication.
# For example token authentication. The default is more or less arbitrary. A non-zero timeout is used to maintain
# some backward compatibility with hypothetical API clients using transient authentication and sessions for some
# purpose. The lifetime should be small enough to limit number of orphaned session in the application server,
# if a lot of API requests are issued.
authentication.transient.maxInactiveSessionSeconds=10

# Webhooks
# Capacity of queue holding unprocessed SSC application events to serialize as webhook payload
webhook.sender.unprocessedEventQueue.capacity=500
# Time since last webhook request to initiate cleanup of unused domain based webhook queues
webhooks.sender.requestBufferCleanup.minutes=180
# Timeout while reading webhook request response
# A timeout of zero is interpreted as an infinite timeout
webhooks.sender.requestReadTimeout.ms=5000
# Timeout while connecting to webhook request server.
# A timeout of zero is interpreted as an infinite timeout.
webhooks.sender.requestConnectionTimeout.ms=10000
# Maximum concurrent connections per domain for sending webhook requests
# Must be between 1-1000
webhooks.sender.maxConnectionsByDomain=10
# Size of webhook history buffer for each domain.
webhooks.sender.maxRequestBuffer=1000
# backward compatibility option: if true, generate timestrings with offset like "+1234" instead of the default "+12:34"
# there is also a parallel property for REST api: "rest.response.useLegacyTimeZoneOffsetFormat"
webhooks.sender.useLegacyTimeZoneOffsetFormat=false

# Webhook history cleaning
#   If following property values are not set within allowed ranges, they will be automatically adjusted by SSC.
# A lowest number of finished history records per webhook that should be preserved by cleaning.
# Minimum is 1.
webhooks.history.keepMin=10
# A highest number of finished history records per webhook allowed to be preserved by cleaning.
# Minimum is 1, maximum is 1000, and must be greater or equal than webhooks.history.keepMin
webhooks.history.keepMax=500
# A number of days back from a cleaning time for which finished min/max webhook history records should
# be preserved, while respecting a higher priority of conditions defined for previous two properties.
# Minimum is 1.
webhooks.history.daysToExpiration=30

# DB batch sizes in rows used by batch managers
# internal default is 1000 and valid range is 1-1000.
batch.size.defaultSize=1000

batch.size.delete.generic=1000
batch.size.delete.plainSQL=10000
batch.size.update.analysisblob=1000
batch.size.insert.analysisblob=1000
batch.size.insert.correlationresult=1000
batch.size.insert.correlationset=1000
batch.size.insert.dynamicissue=1000
batch.size.insert.finding=1000
batch.size.insert.idtable=1000
batch.size.insert.issuemigration=1000
batch.size.insert.scanerror=1000
batch.size.insert.scanfinding=1000
batch.size.insert.sourcefile=1000
batch.size.insert.sourcefileinfo=1000
batch.size.insert.staticissue=1000
batch.size.select.issueattrchangelog=1000
batch.size.insert.issueattrchangelog=1000

#Maximize backward compatibility with Velocity templates from 1.x
templates.velocity.enhancedBackwardCompatibility=false

# If "true", require client to provide credentials (user/password or token) to download Rulepacks
# Otherwise, allow anonymous user to download Rulepacks, which is an existing behavior
rulepack.download.credential.required=false

# configure allowed domain(s) for fortify insight url (use comma-separator if multiple)
# For security, the value will be treated as-if it is prefixed by a dot even if the
# prefix dot is absent, i.e. "foo.com" => ".foo.com"
insight.url.domains=.fortifyinsight.com

# The maximum number of seconds a stale local group cache will be used before
# it is reloaded. Unit must be included.
cache.localGroupMembers.maxStaleDuration=30s

# The maximum amount of time a token authentication results will be cached.
# Unit must be included. If less than 1s, cache is disabled.
cache.tokenAuthentication.maxLifetime=10s
# The maximum amount of cached token authentication results.
cache.tokenAuthentication.maxEntries=2000

# set the interval for running the ldap cache refresh job.
# Must be a whole number between 1-12.
ldap.cache.refresh.interval.hours=6

# if true, use behavior of versions before 23.2 (can result in unnecessary failed lookups and performance impact in multi-ldap configs)
ldap.authz.legacyUserBelongsTo=false

# If Other Name is validated when using Subject Alternative Name lookup in X509 SSO authentication scheme.
# It is not recommended to switch off the validation. Certificates that do not pass the validation should be corrected.
x509.san.otherName.validate=true

# In SSC before 23.2, copying application version state did not include an issue's foundDate (the date when the issue
# was introduced / detected for the first time). The copied state foundDate was set to the issue's latest scan date from
# the source version instead. By setting this to true, the copied state will include also the foundDate from the source version.
projectVersion.stateCopy.preserveFoundDate=true

# Kafka validation request timeout
stream.kafka.producer.validationTimeoutMs=7000

# Kafka producer request timeout
stream.kafka.producer.requestTimeoutMs=20000

# Kafka producer delivery timeout (upper bound on the time to report success or failure, including automatic retries)
stream.kafka.producer.deliveryTimeoutMs=60000

# Time for Kafka producer to wait before sending to allow a micro batch of messages to form.
# This adds a negligible delay for one-off events but allows bulk sending with far fewer requests.
stream.kafka.producer.lingerMs=10

# Kafka producer security protocol to use when encryption is enabled.
stream.kafka.producer.security.protocol=SSL

# When this is turned on, objects saved by the object storage service are also saved as blobs in the database.
# If the object storage service is disabled, this property has no effect.
objectstorage.storeCopyInDatabase=false

# Prefix for object keys stored in the object storage.
# The value must match [a-zA-Z0-9_-]{1,32}.
# The object key format is:
# ${objectstorage.objectKeyPrefix}_${ssc_instance_guid}/${random_uuid}
objectstorage.objectKeyPrefix=SSC

# Total timeout for each object storage remote operation, must be between 1m and 10h.
objectstorage.operationTimeoutMinutes=1h

# Schedule for performing the object storage cleanup job.
# This parameter uses Quartz cron expression dialect.
# For example, "0 0 1/6 ? * * *" value means that cleanup will be performed every 6 hours starting from 1AM.
objectstorage.cleanUpJob.cron=0 0 1/6 ? * * *

# If the number of existing purge jobs is above this threshold, no new auto-purge jobs will be queued.
# Minimum: 1
dataretention.purge.jobs.max=5

# The purge job will put this number(or fewer) of artifacts in each batch purge.
dataretention.purge.artifacts.batch.max=1

# Interval (in minutes) at which quartz will trigger the recurring evaluator task during each hour which is
# specified in configuration.
# Must be in the range 2-59 inclusive.
dataretention.recurrence.interval.minutes=5

# Each invocation of the recurring evaluator task has a nominal allowed operating time limit (in minutes). It should
# exit after that time has been exceeded (if it has not already exited due to other reasons).
# Must be smaller than the recurrence interval value.
dataretention.recurrence.timelimit.minutes=1

# Allow session invalidation if user's permissions have changed.
session.permissionValidation.enable=false

# Maximum number of minutes to wait if another parallel rulepack import is running.
# If the timeout is exceeded the waiting rulepack import is discarded.
# Must be in the range [1,1440].
# 30 minutes is considered as a safe default as the import of one rulepack takes typically from seconds to several minutes.
rulepack.import.lock.timeoutMinutes=30

# Number of concurrent threads processing DAST alertable events.
# Must be in the range [1,100].
event.dast.concurrency.maxActive=5

# The maximum time to wait if DAST alertable events concurrent processing is at full capacity.
# If the timeout is exceeded the waiting event is discarded.
# Must be in the range [0,24h], 0 is interpreted as not waiting at all.
event.dast.concurrency.timeoutMinutes=25m

# Whether to trim leading/trailing spaces from project/projectversion names when creating or updating.
# For update, the name is only trimmed when the client actually submits an edited value.
# legacy behavior (undesirable) is no trimming.
projectVersion.name.trim.enable=true


# When parsing FVDLs for scan date, WriteDate takes precedence over CreatedTS.
# CreatedTS is the standard date for SSC to use.  But, it does not include timezone information.  SSC will treat CreatedTS as being in SSC's timezone.
# WriteDate has the same timestamp as CreatedTS.  But, it also includes timezone information.
# WriteDate also includes milliseconds, which SSC ignores.  CreatedTS does not include milliseconds.
# For example, if a scan has CreatedTS = "4:23:45pm on Jan 1, 2026" and WriteDate = "4:23:45.678pm on Jan 1, 2026 EST",
# and SSC is on PST, SSC will treat CreatedTS as "4:23:45pm on Jan 1, 2026 PST", and WriteDate as "1:23:45pm on Jan 1, 2026 PST".
# Switching this flag has no effect if SCA instances are in the same timezone as SSC.
# If SCA instances and SSC are in different timezones, switching this flag to true will have these effects:
#     1.  SCA scans uploaded prior to the flag switch have effectively had their scan date shifted by the time difference between the SCA and SSC timezones.
#     2.  SCA scans uploaded after the flag switch will maintain their correct time.
#     3.  If a scan was uploaded prior to the switch and re-uploaded after the switch, the two uploads will have different scan dates and be considered distinct scans by SSC.
fvdl.parsing.use.writeDate.as.scanDate=false
