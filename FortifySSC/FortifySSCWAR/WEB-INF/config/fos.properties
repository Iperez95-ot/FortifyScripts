# =============================================================================
# Fortify Object Store (FOS) Configuration
# =============================================================================
# See fortify-object-store/docs/CONFIGURATION.md for full property reference.

# Master switch for the FOS module (default: false)
fortify.object-store.enabled=false

# Global maximum object size in bytes (default: 5 GB)
fortify.object-store.max-size-bytes=5368709120

# Secure temp directory for upload buffering
#fortify.object-store.temp-dir=${fortify.home}/ssc/fos-temp

# Staging directory for two-phase upload staging files
#fortify.object-store.staging-dir=${fortify.home}/ssc/fos-staging

# Filesystem provider base path
#fortify.object-store.filesystem.base-path=${fortify.home}/ssc/object-store

# Per-namespace write strategies (LEGACY_ONLY, DUAL_WRITE, FOS_ONLY)
# During DUAL_WRITE, legacy copies are always preserved — switch back to
# LEGACY_ONLY and delete the object store directory to fully revert.
fortify.object-store.namespaces.fpr.write-strategy=LEGACY_ONLY
fortify.object-store.namespaces.report.write-strategy=LEGACY_ONLY
fortify.object-store.namespaces.attachment.write-strategy=LEGACY_ONLY
fortify.object-store.namespaces.rulepack.write-strategy=LEGACY_ONLY

# Legacy fallback for reads when FOS object not found
fortify.object-store.legacy.fallback-enabled=true

# Upload executor settings (blob store writes, async uploads)
fortify.object-store.upload.core-pool-size=4
fortify.object-store.upload.max-pool-size=8
fortify.object-store.upload.queue-capacity=50
fortify.object-store.upload.shutdown-timeout-seconds=300

# Download executor settings (blob store reads)
fortify.object-store.download.core-pool-size=4
fortify.object-store.download.max-pool-size=10
fortify.object-store.download.queue-capacity=100
fortify.object-store.download.shutdown-timeout-seconds=60

# Orphan Reaper settings
#fortify.object-store.orphan-reaper.cron=0 0 4 * * ?
#fortify.object-store.orphan-reaper.tombstone-grace-hours=24
#fortify.object-store.orphan-reaper.pending-timeout-minutes=60
#fortify.object-store.orphan-reaper.batch-size=50
#fortify.object-store.orphan-reaper.throttle-ms=100
